##
# GitHub Actions CI/CD for inbox-0
#
# On push to main, this workflow will:
# 1. Lint and test the codebase
# 2. Build Docker images for API and frontend
# 3. Push images to GitHub Container Registry (ghcr.io)
# 4. Deploy to your server via SSH (pull + restart)
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_SERVER   - Hostname or IP of your VPS (e.g. inbox-0.com)
#   DEPLOY_USER    - SSH user (e.g. deploy or root)
#   DEPLOY_SSH_KEY - Private SSH key for deployment
#
# Optional secrets:
#   DEPLOY_PATH    - Path on server (default: /opt/inbox0)
##

name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: email_whatsapp_bridge
          POSTGRES_USER: devuser
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://devuser:devpassword@localhost:5432/email_whatsapp_bridge
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=libs/shared/prisma/schema.prisma

      - name: Lint
        run: npx nx run-many --target=lint --all --skip-nx-cache

      - name: Test
        run: npx nx run-many --target=test --all --skip-nx-cache

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      api-image: ${{ steps.meta-api.outputs.tags }}
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/inbox0-api
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}

      - name: Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/inbox0-frontend
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_SERVER }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH,REGISTRY,API_IMAGE,FRONTEND_IMAGE,GHCR_USER,GHCR_TOKEN
          script: |
            set -e
            cd ${DEPLOY_PATH:-/opt/inbox0}
            echo "$GHCR_TOKEN" | docker login $REGISTRY -u $GHCR_USER --password-stdin
            docker compose -f docker-compose.yml -f docker-compose.ci.yml pull api frontend
            docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d api frontend
            docker image prune -f
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          REGISTRY: ${{ env.REGISTRY }}
          API_IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/inbox0-api:${{ github.sha }}
          FRONTEND_IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/inbox0-frontend:${{ github.sha }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
